name: Publish public install release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release tag to publish, for example v0.1.4
        required: true

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: ${{ inputs.version }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci --ignore-scripts
      - run: npm run build

      - name: Pack install artifact
        run: |
          mkdir -p release
          npm pack --pack-destination release
          cp release/thinkless-*.tgz release/thinkless.tgz
          cp scripts/install.sh release/install.sh

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: |
          gh release delete "$VERSION" --repo "$GITHUB_REPOSITORY" --yes --cleanup-tag || true
          gh release create "$VERSION" \
            release/thinkless.tgz \
            release/install.sh \
            --repo "$GITHUB_REPOSITORY" \
            --title "Thinkless $VERSION" \
            --notes "Thinkless install release assets built from the selected source tag."
